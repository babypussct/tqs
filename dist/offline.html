<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TQSShop - Không có kết nối</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #09090b;
      --surface: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --muted: #71717a;
      --red: #dc2626;
      --gold: #fbbf24;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }

    .icon-wrap {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .icon-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(220,38,38,0.15) 0%, transparent 70%);
    }

    .icon-svg {
      width: 64px;
      height: 64px;
      color: var(--red);
      position: relative;
      z-index: 1;
    }

    .brand {
      font-size: 1.75rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .brand span {
      background: linear-gradient(135deg, var(--red), var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 320px;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--gold));
      border-radius: 2px;
      margin: 1.25rem auto;
    }

    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--red);
      color: #fff;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      box-shadow: 0 4px 16px rgba(220,38,38,0.35);
    }

    .retry-btn:hover { background: #b91c1c; }
    .retry-btn:active { transform: scale(0.97); }

    .tips {
      margin-top: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      max-width: 320px;
      text-align: left;
    }

    .tips h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    .tips ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .tips li {
      font-size: 0.85rem;
      color: #a1a1aa;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tips li::before {
      content: '✦';
      color: var(--gold);
      font-size: 0.6rem;
    }

    footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #3f3f46;
    }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
    </svg>
  </div>

  <p class="brand">TQS<span>Shop</span></p>

  <h1>Bạn đang ngoại tuyến</h1>
  <div class="divider"></div>
  <p>
    Không thể kết nối internet. Các trang và ảnh bạn đã xem trước đó vẫn có thể truy cập được.
  </p>

  <button class="retry-btn" onclick="window.location.reload()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 019-9 9.75 9.75 0 016.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 01-9 9 9.75 9.75 0 01-6.74-2.74L3 16"/>
      <path d="M3 21v-5h5"/>
    </svg>
    Thử kết nối lại
  </button>

  <div class="tips">
    <h2>Trong lúc chờ kết nối</h2>
    <ul>
      <li>Xem lại sản phẩm bạn đã xem</li>
      <li>Đọc bài blog đã tải về</li>
      <li>Kiểm tra đơn hàng đã lưu</li>
    </ul>
  </div>

  <footer>TQSShop Online &mdash; By Otada</footer>
</body>
</html>
